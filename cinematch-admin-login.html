<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch — Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF3366; --primary-dark: #CC0033;
            --bg-dark: #0A0A0A; --bg-card: #151515; --bg-elevated: #1F1F1F;
            --text-primary: #FFFFFF; --text-secondary: #A0A0A0; --text-tertiary: #666666;
            --accent-purple: #9D4EDD; --accent-green: #06FFA5;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(255,51,102,0.07) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(157,78,221,0.07) 0%, transparent 50%);
            pointer-events: none;
        }

        .card {
            position: relative; z-index: 1;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 28px;
            padding: 48px 44px;
            width: 420px;
            max-width: 95vw;
            animation: fadeIn 0.5s ease;
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
        }
        .logo-text {
            font-size: 30px; font-weight: 900; letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .admin-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 14px;
            background: rgba(255,51,102,0.12);
            border: 1px solid rgba(255,51,102,0.25);
            border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
            color: var(--primary); text-transform: uppercase;
        }

        h2 {
            font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
            margin: 28px 0 6px;
        }
        .subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }

        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block; font-size: 12px; font-weight: 700;
            color: var(--text-secondary); text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 8px;
        }
        .form-input {
            width: 100%; padding: 13px 16px;
            background: var(--bg-elevated);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif; font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,51,102,0.1);
        }
        .form-input::placeholder { color: var(--text-tertiary); }

        .submit-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; border-radius: 12px;
            color: white; font-family: 'Outfit', sans-serif;
            font-size: 15px; font-weight: 700; cursor: pointer;
            transition: all 0.3s; margin-top: 8px;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,51,102,0.35); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .error-msg {
            margin-top: 16px; padding: 12px 16px;
            background: rgba(255,51,102,0.1);
            border: 1px solid rgba(255,51,102,0.25);
            border-radius: 10px;
            color: var(--primary); font-size: 13px; font-weight: 500;
            display: none; text-align: center;
        }

        .divider {
            text-align: center; margin-top: 28px;
            color: var(--text-tertiary); font-size: 13px;
        }
        .divider a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
        .divider a:hover { color: var(--text-primary); }

        .lock-icon {
            width: 56px; height: 56px;
            background: rgba(255,51,102,0.1);
            border: 1px solid rgba(255,51,102,0.2);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; margin: 0 auto 20px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <div class="logo-text">CineMatch</div>
        <div><span class="admin-badge">Admin Portal</span></div>
    </div>

    <div class="lock-icon" style="margin-top:24px;">🔐</div>

    <h2>Admin Sign In</h2>
    <p class="subtitle">Restricted access — authorized personnel only.</p>

    <form onsubmit="handleLogin(event)">
        <div class="form-group">
            <label class="form-label">Username or Email</label>
            <input class="form-input" id="identifier" type="text" placeholder="admin@cinematch.com" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button class="submit-btn" id="submitBtn" type="submit">Sign In to Admin Panel</button>
        <div class="error-msg" id="errorMsg"></div>
    </form>

    <div class="divider">
        Not an admin? <a href="/login">Go to user login →</a>
    </div>
</div>

<script>
    // If already logged in as admin, skip the login page
    (async function () {
        const r = await fetch('/api/admin/me', { credentials: 'include' });
        const data = await r.json();
        if (data.logged_in) window.location.href = '/admin/dashboard';
    })();

    async function handleLogin(e) {
        e.preventDefault();

        const identifier = document.getElementById('identifier').value.trim();
        const password   = document.getElementById('password').value;
        const btn        = document.getElementById('submitBtn');
        const errEl      = document.getElementById('errorMsg');

        errEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Signing in…';

        try {
            const res  = await fetch('/api/admin/login', {
                method:      'POST',
                credentials: 'include',
                headers:     { 'Content-Type': 'application/json' },
                body:        JSON.stringify({ identifier, password }),
            });
            const data = await res.json();

            if (data.success) {
                window.location.href = data.redirect || '/admin/dashboard';
            } else {
                errEl.textContent    = data.message;
                errEl.style.display  = 'block';
                btn.disabled         = false;
                btn.textContent      = 'Sign In to Admin Panel';
            }
        } catch {
            errEl.textContent   = 'Network error. Is the server running?';
            errEl.style.display = 'block';
            btn.disabled        = false;
            btn.textContent     = 'Sign In to Admin Panel';
        }
    }
</script>

</body>
</html>
