<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch - Community Awards</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF3366; --primary-dark: #CC0033;
            --bg-dark: #0A0A0A; --bg-card: #151515; --bg-elevated: #1F1F1F;
            --text-primary: #FFFFFF; --text-secondary: #A0A0A0; --text-tertiary: #666666;
            --accent-blue: #00D9FF; --accent-purple: #9D4EDD; --accent-yellow: #FFD60A; --accent-green: #06FFA5;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow-x: hidden; }
        body::before { content: ''; position: fixed; top:0;left:0;right:0;bottom:0; background: radial-gradient(circle at 10% 20%, rgba(255,51,102,0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(157,78,221,0.08) 0%, transparent 40%); pointer-events: none; z-index: 0; }
        .main-container { position: relative; z-index: 1; min-height: 100vh; }
        .nav { position: sticky; top: 0; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 0 40px; z-index: 100; height: 80px; display: flex; align-items: center; justify-content: space-between; }
        .nav-left { display: flex; align-items: center; gap: 48px; }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, var(--primary), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
        .nav-links { display: flex; gap: 32px; list-style: none; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 15px; font-weight: 500; transition: all 0.3s ease; position: relative; }
        .nav-link:hover, .nav-link.active { color: var(--text-primary); }
        .nav-link.active::after { content: ''; position: absolute; bottom: -28px; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--accent-purple)); border-radius: 2px 2px 0 0; }
        .nav-right { display: flex; align-items: center; gap: 24px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); display: flex; align-items: center; justify-content: center; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 15px; }
        .page-content { padding: 48px 80px 80px; }
        .page-header { margin-bottom: 12px; animation: fadeInUp 0.5s ease; }
        .page-header h1 { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-bottom: 8px; }
        .page-header p { color: var(--text-secondary); font-size: 16px; font-weight: 300; }
        .highlight { color: var(--primary); }
        .month-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 20px; background: rgba(255,214,10,0.1); border: 1px solid rgba(255,214,10,0.3); border-radius: 24px; font-size: 14px; font-weight: 600; color: var(--accent-yellow); margin-bottom: 40px; animation: fadeInUp 0.5s ease 0.05s backwards; }
        .no-data-notice { background: rgba(255,214,10,0.06); border: 1px solid rgba(255,214,10,0.15); border-radius: 12px; padding: 12px 20px; color: var(--accent-yellow); font-size: 13px; margin-bottom: 24px; display: none; }
        .awards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 48px; animation: fadeInUp 0.5s ease 0.1s backwards; }
        .award-card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 28px; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .award-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .award-card.gold::before   { background: linear-gradient(90deg, var(--accent-yellow), #FF9500); }
        .award-card.purple::before { background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); }
        .award-card.red::before    { background: linear-gradient(90deg, var(--primary), var(--accent-purple)); }
        .award-card.green::before  { background: linear-gradient(90deg, var(--accent-green), var(--accent-blue)); }
        .award-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
        .award-icon { font-size: 36px; margin-bottom: 16px; }
        .award-category { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-tertiary); margin-bottom: 8px; }
        .award-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
        .award-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
        .award-winner { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg-elevated); border-radius: 12px; cursor: pointer; transition: background 0.2s; }
        .award-winner:hover { background: #2a2a2a; }
        .winner-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
        .gold   .winner-avatar { background: linear-gradient(135deg, var(--accent-yellow), #FF9500); color: #000; }
        .purple .winner-avatar { background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue)); color: #fff; }
        .red    .winner-avatar { background: linear-gradient(135deg, var(--primary), var(--accent-purple)); color: #fff; }
        .green  .winner-avatar { background: linear-gradient(135deg, var(--accent-green), var(--accent-blue)); color: #000; }
        .winner-info { flex: 1; }
        .winner-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
        .winner-stat { font-size: 13px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
        .no-winner { color: var(--text-tertiary); font-size: 14px; padding: 12px 0; }
        .movie-awards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 48px; animation: fadeInUp 0.5s ease 0.2s backwards; }
        .movie-award-card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); position: relative; }
        .movie-award-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(0,0,0,0.6); border-color: rgba(255,51,102,0.3); }
        .movie-award-poster { width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, var(--bg-elevated), var(--bg-card)); display: flex; align-items: center; justify-content: center; font-size: 64px; position: relative; overflow: hidden; }
        .movie-award-poster img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
        .movie-award-poster::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-card), transparent 60%); }
        .award-ribbon { position: absolute; top: 12px; right: 12px; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; z-index: 2; }
        .ribbon-gold { background: var(--accent-yellow); color: #000; }
        .ribbon-red  { background: var(--primary); color: #fff; }
        .ribbon-blue { background: var(--accent-blue); color: #000; }
        .movie-award-info { padding: 16px; }
        .award-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .award-label.gold { color: var(--accent-yellow); }
        .award-label.red  { color: var(--primary); }
        .award-label.blue { color: var(--accent-blue); }
        .movie-award-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .movie-award-meta  { font-size: 13px; color: var(--text-secondary); }
        .clickable-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 8px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .section-title  { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
        .archive-list   { display: flex; flex-direction: column; gap: 12px; }
        .archive-item   { background: var(--bg-card); border-radius: 14px; border: 1px solid rgba(255,255,255,0.04); overflow: hidden; }
        .archive-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; cursor: pointer; transition: background 0.2s; }
        .archive-header:hover { background: var(--bg-elevated); }
        .archive-month  { font-size: 15px; font-weight: 700; }
        .archive-toggle { color: var(--text-tertiary); font-size: 16px; transition: transform 0.3s; }
        .archive-toggle.open { transform: rotate(180deg); }
        .archive-body   { display: none; padding: 0 20px 20px; border-top: 1px solid rgba(255,255,255,0.04); }
        .archive-body.open { display: block; }
        .archive-mini-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-top: 14px; }
        .amc { background: var(--bg-elevated); border-radius: 10px; padding: 12px 14px; }
        .amc-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-tertiary); margin-bottom: 4px; }
        .amc-val { font-size: 14px; font-weight: 600; }
        .amc-sub { font-size: 12px; color: var(--text-secondary); }
        .loading-state { text-align: center; padding: 80px; color: var(--text-secondary); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,214,10,0.2); border-top-color: var(--accent-yellow); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 999; padding: 40px 20px; overflow-y: auto; }
        .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
        .modal-box { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; width: 100%; max-width: 680px; position: relative; overflow: hidden; animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1); }
        .modal-close { position: absolute; top: 16px; right: 16px; z-index: 10; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.08); border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .modal-close:hover { background: rgba(255,255,255,0.15); }
        .movie-modal-hero { width: 100%; height: 200px; position: relative; overflow: hidden; background: linear-gradient(135deg, var(--bg-elevated), #1a1a2e); display: flex; align-items: center; justify-content: center; font-size: 80px; }
        .movie-modal-hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .movie-modal-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-card) 0%, transparent 60%); }
        .movie-modal-poster { position: absolute; left: 28px; bottom: -50px; width: 90px; height: 135px; border-radius: 10px; overflow: hidden; border: 3px solid var(--bg-card); box-shadow: 0 8px 24px rgba(0,0,0,0.6); background: var(--bg-elevated); display: flex; align-items: center; justify-content: center; font-size: 36px; }
        .movie-modal-poster img { width: 100%; height: 100%; object-fit: cover; }
        .movie-modal-body { padding: 64px 28px 28px; }
        .movie-modal-title { font-size: 26px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
        .movie-modal-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
        .movie-modal-meta span { font-size: 13px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
        .movie-modal-genres { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .genre-tag { padding: 4px 12px; background: rgba(255,255,255,0.06); border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .movie-modal-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 20px; }
        .modal-award-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 16px; }
        .badge-gold { background: rgba(255,214,10,0.12); color: var(--accent-yellow); border: 1px solid rgba(255,214,10,0.3); }
        .badge-red  { background: rgba(255,51,102,0.12); color: var(--primary); border: 1px solid rgba(255,51,102,0.3); }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { padding: 10px 20px; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; }
        .modal-btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .modal-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,51,102,0.35); }
        .modal-btn-secondary { background: rgba(255,255,255,0.08); color: var(--text-primary); }
        .modal-btn-secondary:hover { background: rgba(255,255,255,0.13); }
        .user-modal-header { padding: 32px 28px 20px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .user-modal-avatar { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800; flex-shrink: 0; background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue)); }
        .user-modal-name { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
        .user-modal-sub  { font-size: 13px; color: var(--text-secondary); }
        .user-modal-body { padding: 20px 28px 28px; }
        .user-stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
        .user-stat { background: var(--bg-elevated); border-radius: 12px; padding: 14px 16px; text-align: center; }
        .user-stat-val { font-size: 24px; font-weight: 900; font-family: 'JetBrains Mono', monospace; color: var(--primary); }
        .user-stat-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
        .user-modal-bio { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }
        .modal-loading { text-align: center; padding: 60px 28px; color: var(--text-secondary); }
        .modal-spinner { width: 32px; height: 32px; border: 3px solid rgba(255,51,102,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }

        @keyframes fadeInUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        @keyframes slideUp  { from { opacity:0; transform: translateY(32px); } to { opacity:1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 1024px) { .page-content{padding:40px;} .nav-links{display:none;} .awards-grid{grid-template-columns:1fr;} .movie-awards-grid{grid-template-columns:1fr 1fr;} .archive-mini-grid{grid-template-columns:1fr;} .user-stats-grid{grid-template-columns:repeat(2,1fr);} }
    </style>
</head>
<body>
<div class="main-container">
    <nav class="nav">
        <div class="nav-left">
            <a href="/browse" class="logo">CineMatch</a>
            <ul class="nav-links">
                <li><a href="/browse" class="nav-link">Browse</a></li>
                <li><a href="/browse" class="nav-link" onclick="sessionStorage.setItem('section','watchlist');return true;">Watchlist</a></li>
                <li><a href="/recommendations" class="nav-link">For You</a></li>
                <li><a href="/browse#trending" class="nav-link" onclick="window.location.href='/browse';return false;">Trending</a></li>
                <li><a href="/cineblend" class="nav-link">CineBlend</a></li>
                <li><a href="/awards" class="nav-link active">Awards</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="user-avatar" id="avatarBtn"></div>
        </div>
    </nav>
    <div class="page-content">
        <div class="page-header">
            <h1>Community <span class="highlight">Awards</span></h1>
            <p>Monthly highlights calculated automatically from community activity</p>
        </div>
        <div id="awardsContent">
            <div class="loading-state"><div class="loading-spinner"></div><p>Loading awards…</p></div>
        </div>
    </div>
</div>

<!-- Movie Modal -->
<div class="modal-overlay" id="movieModal">
    <div class="modal-box">
        <button class="modal-close" id="movieModalClose">✕</button>
        <div id="movieModalContent">
            <div class="modal-loading"><div class="modal-spinner"></div><p>Loading…</p></div>
        </div>
    </div>
</div>

<!-- User Modal -->
<div class="modal-overlay" id="userModal">
    <div class="modal-box">
        <button class="modal-close" id="userModalClose">✕</button>
        <div id="userModalContent">
            <div class="modal-loading"><div class="modal-spinner"></div><p>Loading…</p></div>
        </div>
    </div>
</div>

<script>
const API = 'http://localhost:5000/api';

// Modal helpers
function openModal(id) { document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }

document.getElementById('movieModalClose').onclick = () => closeModal('movieModal');
document.getElementById('userModalClose').onclick  = () => closeModal('userModal');
document.getElementById('movieModal').onclick = (e) => { if (e.target === e.currentTarget) closeModal('movieModal'); };
document.getElementById('userModal').onclick  = (e) => { if (e.target === e.currentTarget) closeModal('userModal'); };
document.addEventListener('keydown', e => { if (e.key==='Escape') { closeModal('movieModal'); closeModal('userModal'); } });

// Init
(async function init() {
    const me = await fetch(`${API}/me`,{credentials:'include'}).then(r=>r.json()).catch(()=>({logged_in:false}));
    if (!me.logged_in) { window.location.href='/login'; return; }
    document.getElementById('avatarBtn').textContent = me.username.slice(0,2).toUpperCase();
    setupAvatar(me.username);
    loadAwards();
})();

// Movie modal
async function openMovieModal(title, awardLabel, badgeClass) {
    document.getElementById('movieModalContent').innerHTML =
        '<div class="modal-loading"><div class="modal-spinner"></div><p>Loading movie…</p></div>';
    openModal('movieModal');
    try {
        const res  = await fetch(`${API}/movies?search=${encodeURIComponent(title)}`, {credentials:'include'});
        const data = await res.json();
        const movie = (data.data||[]).find(m => m.title.toLowerCase()===title.toLowerCase()) || (data.data||[])[0];
        if (!movie) { document.getElementById('movieModalContent').innerHTML='<div class="modal-loading"><p style="color:var(--text-tertiary)">No details found.</p></div>'; return; }
        const dr   = await fetch(`${API}/movies/${movie.movie_id}`,{credentials:'include'});
        const dd   = await dr.json();
        const m    = dd.data || movie;
        const genres  = (m.genres||'').split(',').map(g=>g.trim()).filter(Boolean);
        const runtime = m.runtime ? `${Math.floor(m.runtime/60)}h ${m.runtime%60}m` : '';
        document.getElementById('movieModalContent').innerHTML = `
            <div class="movie-modal-hero">
                ${m.poster_url ? `<img src="${esc(m.poster_url)}" alt="">` : '🎬'}
                <div class="movie-modal-hero-overlay"></div>
                <div class="movie-modal-poster">${m.poster_url ? `<img src="${esc(m.poster_url)}" alt="">` : '🎬'}</div>
            </div>
            <div class="movie-modal-body">
                <div class="modal-award-badge ${badgeClass}">🏆 ${esc(awardLabel)}</div>
                <div class="movie-modal-title">${esc(m.title)}</div>
                <div class="movie-modal-meta">
                    ${m.release_year ? `<span>📅 ${m.release_year}</span>` : ''}
                    ${runtime ? `<span>⏱ ${runtime}</span>` : ''}
                    ${m.average_rating ? `<span>⭐ ${parseFloat(m.average_rating).toFixed(1)} (${m.total_ratings||0} ratings)</span>` : ''}
                    ${m.director ? `<span>🎬 ${esc(m.director)}</span>` : ''}
                </div>
                ${genres.length ? `<div class="movie-modal-genres">${genres.map(g=>`<span class="genre-tag">${esc(g)}</span>`).join('')}</div>` : ''}
                ${m.description ? `<p class="movie-modal-desc">${esc(m.description)}</p>` : ''}
                ${m.cast ? `<p style="font-size:13px;color:var(--text-tertiary);margin-bottom:16px;">🎭 ${esc(m.cast)}</p>` : ''}
                <div class="modal-actions">
                    <button class="modal-btn modal-btn-primary" onclick="window.location.href='/browse'">Browse Movies</button>
                    ${m.trailer_url ? `<button class="modal-btn modal-btn-secondary" onclick="window.open(this.dataset.url,'_blank')" data-url="${esc(m.trailer_url)}">▶ Trailer</button>` : ''}
                </div>
            </div>`;
    } catch(e) {
        document.getElementById('movieModalContent').innerHTML='<div class="modal-loading"><p style="color:var(--primary)">Could not load details.</p></div>';
    }
}

// User modal
async function openUserModal(username, awardLabel) {
    document.getElementById('userModalContent').innerHTML =
        '<div class="modal-loading"><div class="modal-spinner"></div><p>Loading profile…</p></div>';
    openModal('userModal');
    try {
        const res  = await fetch(`${API}/profile/${encodeURIComponent(username)}`,{credentials:'include'});
        const data = await res.json();
        if (!data.success) { document.getElementById('userModalContent').innerHTML='<div class="modal-loading"><p style="color:var(--text-tertiary)">Profile not found.</p></div>'; return; }
        const u = data.data;

        // Reviews dropdown
        const reviewsHTML = u.reviews && u.reviews.length
            ? u.reviews.map(r => `
                <div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
                    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                        <strong style="font-size:13px;">${esc(r.movie)}</strong>
                        <span style="color:var(--accent-yellow);font-size:12px;">⭐ ${r.rating.toFixed(1)}</span>
                    </div>
                    <p style="font-size:13px;color:var(--text-secondary);line-height:1.5;">${esc(r.review_text)}</p>
                    <small style="color:var(--text-tertiary);font-size:11px;">${esc(r.created_at)}</small>
                </div>`).join('')
            : '<p style="color:var(--text-tertiary);font-size:13px;padding:8px 0;">No public reviews yet.</p>';

        // Watchlist dropdown
        const watchlistHTML = u.watchlist_public && u.watchlist && u.watchlist.length
            ? u.watchlist.slice(0,10).map(w => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
                    <div>
                        <div style="font-size:13px;font-weight:600;">${esc(w.title)}</div>
                        <div style="font-size:11px;color:var(--text-tertiary);">${w.release_year||'—'} · ⭐ ${w.avg_rating}</div>
                    </div>
                    <small style="color:var(--text-tertiary);font-size:11px;">${esc(w.added_at)}</small>
                </div>`).join('')
            : `<p style="color:var(--text-tertiary);font-size:13px;padding:8px 0;">${u.watchlist_public ? 'Watchlist is empty.' : 'Watchlist is private.'}</p>`;

        document.getElementById('userModalContent').innerHTML = `
            <div class="user-modal-header">
                <div class="user-modal-avatar">${esc(username.slice(0,2).toUpperCase())}</div>
                <div>
                    <div class="user-modal-name">@${esc(username)}</div>
                    <div class="user-modal-sub">🏆 ${esc(awardLabel)}</div>
                    ${u.location ? `<div class="user-modal-sub" style="margin-top:4px">📍 ${esc(u.location)}</div>` : ''}
                    ${u.member_since ? `<div class="user-modal-sub" style="margin-top:2px;font-family:'JetBrains Mono',monospace;font-size:11px;">Since ${esc(u.member_since)}</div>` : ''}
                </div>
            </div>
            <div class="user-modal-body">
                <div class="user-stats-grid">
                    <div class="user-stat"><div class="user-stat-val">${u.stats?.total_rated??'—'}</div><div class="user-stat-label">Ratings</div></div>
                    <div class="user-stat"><div class="user-stat-val">${u.stats?.total_reviews??'—'}</div><div class="user-stat-label">Reviews</div></div>
                    <div class="user-stat"><div class="user-stat-val">${u.stats?.watchlist_count??'—'}</div><div class="user-stat-label">Watchlist</div></div>
                </div>
                <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;">
                    ${u.stats?.avg_rating ? `<span style="font-size:13px;color:var(--text-secondary);">⭐ Avg <strong>${u.stats.avg_rating}</strong></span>` : ''}
                    ${u.stats?.top_genre && u.stats.top_genre !== '—' ? `<span style="font-size:13px;color:var(--text-secondary);">🎬 Loves <strong>${esc(u.stats.top_genre)}</strong></span>` : ''}
                    ${u.stats?.fav_decade && u.stats.fav_decade !== '—' ? `<span style="font-size:13px;color:var(--text-secondary);">📅 <strong>${esc(u.stats.fav_decade)}</strong></span>` : ''}
                </div>
                ${u.bio ? `<p class="user-modal-bio">${esc(u.bio)}</p>` : ''}

                <!-- Reviews dropdown -->
                <div style="border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;margin-bottom:10px;">
                    <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.dd-arrow').style.transform=this.nextElementSibling.style.display==='block'?'rotate(180deg)':''"
                        style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;background:var(--bg-elevated);">
                        <span style="font-size:13px;font-weight:700;">✍️ Reviews (${u.stats?.total_reviews??0})</span>
                        <span class="dd-arrow" style="color:var(--text-tertiary);transition:transform 0.2s;">▼</span>
                    </div>
                    <div style="display:none;padding:0 16px;max-height:220px;overflow-y:auto;">
                        ${reviewsHTML}
                    </div>
                </div>

                <!-- Watchlist dropdown -->
                <div style="border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;">
                    <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.dd-arrow').style.transform=this.nextElementSibling.style.display==='block'?'rotate(180deg)':''"
                        style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;background:var(--bg-elevated);">
                        <span style="font-size:13px;font-weight:700;">🔖 Watchlist ${u.watchlist_public ? `(${u.watchlist?.length??0})` : '(Private)'}</span>
                        <span class="dd-arrow" style="color:var(--text-tertiary);transition:transform 0.2s;">▼</span>
                    </div>
                    <div style="display:none;padding:0 16px;max-height:220px;overflow-y:auto;">
                        ${watchlistHTML}
                    </div>
                </div>
            </div>`;
    } catch(e) {
        document.getElementById('userModalContent').innerHTML='<div class="modal-loading"><p style="color:var(--primary)">Could not load profile.</p></div>';
    }
}

// Attach click handlers after render using event delegation
document.getElementById('awardsContent').addEventListener('click', function(e) {
    const movieCard = e.target.closest('[data-movie]');
    const userCard  = e.target.closest('[data-user]');
    const winnerEl  = e.target.closest('[data-winner-movie]');
    const winnerUser= e.target.closest('[data-winner-user]');
    if (movieCard)  openMovieModal(movieCard.dataset.movie, movieCard.dataset.award, movieCard.dataset.badge);
    if (userCard)   openUserModal(userCard.dataset.user, userCard.dataset.award);
    if (winnerEl)   openMovieModal(winnerEl.dataset.winnerMovie, winnerEl.dataset.award, winnerEl.dataset.badge);
    if (winnerUser) openUserModal(winnerUser.dataset.winnerUser, winnerUser.dataset.award);
});

async function loadAwards() {
    try {
        const r = await fetch(`${API}/awards`,{credentials:'include'});
        const d = await r.json();
        if (!d.success) { document.getElementById('awardsContent').innerHTML=`<p style="color:var(--primary);padding:40px">${esc(d.message)}</p>`; return; }
        renderAwards(d);
    } catch(e) {
        document.getElementById('awardsContent').innerHTML='<p style="color:var(--primary);padding:40px">Could not load awards. Is Flask running?</p>';
    }
}

function renderAwards(d) {
    const a = d.current_awards;
    const topMovie    = a.top_movie    || {};
    const mostWatched = a.most_watched || {};
    const topReviewer = a.top_reviewer || {};
    const topGenre    = a.top_genre    || {};

    const noDataHTML = !d.has_current_data
        ? '<div class="no-data-notice" style="display:block">⚠️ This month\'s awards are still being calculated.</div>' : '';

    const badgeHTML = `<div class="month-badge">🏆 ${esc(d.current_month)} Winners</div>`;

    const movieAwardsHTML = `
        <div class="section-header"><h2 class="section-title">Movie Awards</h2></div>
        <div class="movie-awards-grid">
            <div class="movie-award-card"
                ${topMovie.title ? `data-movie="${esc(topMovie.title)}" data-award="Top Rated Movie" data-badge="badge-gold"` : ''}
                style="${topMovie.title ? 'cursor:pointer' : ''}">
                <div class="movie-award-poster">🎬<div class="award-ribbon ribbon-gold">🥇 Top Rated</div></div>
                <div class="movie-award-info">
                    <div class="award-label gold">Top Rated Movie of the Month</div>
                    <div class="movie-award-title">${topMovie.title ? esc(topMovie.title) : 'No data yet'}</div>
                    <div class="movie-award-meta">${topMovie.value ? esc(topMovie.value) : '—'}</div>
                    ${topMovie.title ? '<div class="clickable-hint">👆 Click to view details</div>' : ''}
                </div>
            </div>
            <div class="movie-award-card"
                ${mostWatched.title ? `data-movie="${esc(mostWatched.title)}" data-award="Most Watchlisted" data-badge="badge-red"` : ''}
                style="${mostWatched.title ? 'cursor:pointer' : ''}">
                <div class="movie-award-poster">🎬<div class="award-ribbon ribbon-red">🔖 Most Saved</div></div>
                <div class="movie-award-info">
                    <div class="award-label red">Most Watchlisted Movie</div>
                    <div class="movie-award-title">${mostWatched.title ? esc(mostWatched.title) : 'No data yet'}</div>
                    <div class="movie-award-meta">${mostWatched.value ? esc(mostWatched.value) : '—'}</div>
                    ${mostWatched.title ? '<div class="clickable-hint">👆 Click to view details</div>' : ''}
                </div>
            </div>
            <div class="movie-award-card"
                ${topReviewer.username ? `data-user="${esc(topReviewer.username)}" data-award="Most Active Reviewer"` : ''}
                style="${topReviewer.username ? 'cursor:pointer' : ''}">
                <div class="movie-award-poster" style="background:linear-gradient(135deg,#1a1a2e,#16213e);">
                    <span style="font-size:64px;position:relative;z-index:1">✍️</span>
                    <div class="award-ribbon ribbon-blue">💬 Most Reviewed</div>
                </div>
                <div class="movie-award-info">
                    <div class="award-label blue">Most Active Reviewer</div>
                    <div class="movie-award-title">${topReviewer.username ? esc(topReviewer.username) : 'No data yet'}</div>
                    <div class="movie-award-meta">${topReviewer.value ? esc(topReviewer.value) : '—'}</div>
                    ${topReviewer.username ? '<div class="clickable-hint">👆 Click to view profile</div>' : ''}
                </div>
            </div>
        </div>`;

    const communityHTML = `
        <div class="section-header"><h2 class="section-title">Community Awards</h2></div>
        <div class="awards-grid">
            <div class="award-card gold">
                <div class="award-icon">✍️</div>
                <div class="award-category">Community Award</div>
                <div class="award-title">Most Active Reviewer</div>
                <div class="award-subtitle">Wrote the most reviews this month</div>
                ${topReviewer.username
                    ? `<div class="award-winner" data-winner-user="${esc(topReviewer.username)}" data-award="Most Active Reviewer">
                        <div class="winner-avatar">${topReviewer.username.slice(0,2).toUpperCase()}</div>
                        <div class="winner-info"><div class="winner-name">${esc(topReviewer.username)}</div><div class="winner-stat">${esc(topReviewer.value)}</div></div>
                        <span style="color:var(--text-tertiary);font-size:18px">→</span></div>`
                    : '<div class="no-winner">No reviews this month yet.</div>'}
            </div>
            <div class="award-card purple">
                <div class="award-icon">⭐</div>
                <div class="award-category">Community Award</div>
                <div class="award-title">Top Rated Movie</div>
                <div class="award-subtitle">Highest rated movie this month</div>
                ${topMovie.title
                    ? `<div class="award-winner" data-winner-movie="${esc(topMovie.title)}" data-award="Top Rated Movie" data-badge="badge-gold">
                        <div class="winner-avatar">🎬</div>
                        <div class="winner-info"><div class="winner-name">${esc(topMovie.title)}</div><div class="winner-stat">${esc(topMovie.value)}</div></div>
                        <span style="color:var(--text-tertiary);font-size:18px">→</span></div>`
                    : '<div class="no-winner">No ratings this month yet.</div>'}
            </div>
            <div class="award-card red">
                <div class="award-icon">🎭</div>
                <div class="award-category">Community Award</div>
                <div class="award-title">Genre of the Month</div>
                <div class="award-subtitle">Most activity in a single genre</div>
                ${topGenre.genre
                    ? `<div class="award-winner" style="cursor:default">
                        <div class="winner-avatar">🎬</div>
                        <div class="winner-info"><div class="winner-name">${esc(topGenre.genre)}</div><div class="winner-stat">${esc(topGenre.value)}</div></div></div>`
                    : '<div class="no-winner">No genre data yet.</div>'}
            </div>
            <div class="award-card green">
                <div class="award-icon">📽️</div>
                <div class="award-category">Community Award</div>
                <div class="award-title">Most Watchlisted</div>
                <div class="award-subtitle">Most added to watchlists this month</div>
                ${mostWatched.title
                    ? `<div class="award-winner" data-winner-movie="${esc(mostWatched.title)}" data-award="Most Watchlisted" data-badge="badge-red">
                        <div class="winner-avatar">🔖</div>
                        <div class="winner-info"><div class="winner-name">${esc(mostWatched.title)}</div><div class="winner-stat">${esc(mostWatched.value)}</div></div>
                        <span style="color:var(--text-tertiary);font-size:18px">→</span></div>`
                    : '<div class="no-winner">No watchlist activity yet.</div>'}
            </div>
        </div>`;

    const archiveHTML = d.archive && d.archive.length
        ? `<div class="section-header"><h2 class="section-title">📅 Past Awards</h2></div>
           <div class="archive-list">${d.archive.map((month,i)=>`
               <div class="archive-item">
                   <div class="archive-header" onclick="toggleArch(${i})">
                       <span class="archive-month">${esc(month.label)}</span>
                       <span class="archive-toggle" id="at-${i}">▼</span>
                   </div>
                   <div class="archive-body" id="ab-${i}">
                       <div class="archive-mini-grid">
                           <div class="amc"><div class="amc-cat">🏆 Top Movie</div><div class="amc-val">${esc(month.awards.top_movie?.title||'—')}</div><div class="amc-sub">${esc(month.awards.top_movie?.value||'')}</div></div>
                           <div class="amc"><div class="amc-cat">✍️ Top Reviewer</div><div class="amc-val">${esc(month.awards.top_reviewer?.username||'—')}</div><div class="amc-sub">${esc(month.awards.top_reviewer?.value||'')}</div></div>
                           <div class="amc"><div class="amc-cat">📽️ Most Watched</div><div class="amc-val">${esc(month.awards.most_watched?.title||'—')}</div><div class="amc-sub">${esc(month.awards.most_watched?.value||'')}</div></div>
                           <div class="amc"><div class="amc-cat">🎭 Genre</div><div class="amc-val">${esc(month.awards.top_genre?.genre||'—')}</div><div class="amc-sub">${esc(month.awards.top_genre?.value||'')}</div></div>
                       </div>
                   </div>
               </div>`).join('')}
           </div>`
        : `<div class="section-header"><h2 class="section-title">📅 Past Awards</h2></div>
           <p style="color:var(--text-tertiary);font-size:14px;padding:8px 0;">No past award data yet — check back next month!</p>`;

    document.getElementById('awardsContent').innerHTML = noDataHTML + badgeHTML + movieAwardsHTML + communityHTML + archiveHTML;
}

function toggleArch(i) {
    const body = document.getElementById(`ab-${i}`);
    const tog  = document.getElementById(`at-${i}`);
    body.classList.toggle('open');
    tog.classList.toggle('open', body.classList.contains('open'));
}

function setupAvatar(username) {
    document.getElementById('avatarBtn').onclick = () => {
        const ex=document.getElementById('avatarMenu'); if(ex){ex.remove();return;}
        const btn=document.getElementById('avatarBtn'); const rect=btn.getBoundingClientRect();
        const menu=document.createElement('div'); menu.id='avatarMenu';
        menu.style.cssText=`position:fixed;top:${rect.bottom+8}px;right:${window.innerWidth-rect.right}px;background:var(--bg-card);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:8px;z-index:9999;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,0.5);`;
        menu.innerHTML=`
            <button onclick="window.location.href='/browse'" style="width:100%;padding:10px 16px;background:transparent;border:none;color:white;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;border-radius:8px;text-align:left;">🏠 Main Page</button>
            <button onclick="window.location.href='/profile'" style="width:100%;padding:10px 16px;background:transparent;border:none;color:white;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;border-radius:8px;text-align:left;">👤 My Profile</button>
            <button onclick="window.location.href='/dashboard'" style="width:100%;padding:10px 16px;background:transparent;border:none;color:white;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;border-radius:8px;text-align:left;">📊 Dashboard</button>
            <button onclick="logout()" style="width:100%;padding:10px 16px;background:transparent;border:none;color:#FF3366;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;border-radius:8px;text-align:left;">🚪 Log Out</button>`;
        document.body.appendChild(menu);
        setTimeout(()=>document.addEventListener('click',function h(e){if(!menu.contains(e.target)&&e.target!==btn){menu.remove();document.removeEventListener('click',h);}}),0);
    };
}

async function logout(){await fetch(`${API}/logout`,{method:'POST',credentials:'include'});window.location.href='/login';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
