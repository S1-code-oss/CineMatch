<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch - For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF3366; --primary-dark: #CC0033;
            --bg-dark: #0A0A0A; --bg-card: #151515; --bg-elevated: #1F1F1F;
            --text-primary: #FFFFFF; --text-secondary: #A0A0A0; --text-tertiary: #666666;
            --accent-blue: #00D9FF; --accent-purple: #9D4EDD; --accent-yellow: #FFD60A; --accent-green: #06FFA5;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow-x: hidden; }
        body::before { content: ''; position: fixed; top:0;left:0;right:0;bottom:0; background: radial-gradient(circle at 10% 20%, rgba(255,51,102,0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(157,78,221,0.08) 0%, transparent 40%); pointer-events: none; z-index: 0; }
        .main-container { position: relative; z-index: 1; min-height: 100vh; }
        .nav { position: sticky; top: 0; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 0 40px; z-index: 100; height: 80px; display: flex; align-items: center; justify-content: space-between; }
        .nav-left { display: flex; align-items: center; gap: 48px; }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, var(--primary), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
        .nav-links { display: flex; gap: 32px; list-style: none; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 15px; font-weight: 500; transition: all 0.3s ease; position: relative; }
        .nav-link:hover, .nav-link.active { color: var(--text-primary); }
        .nav-link.active::after { content: ''; position: absolute; bottom: -28px; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--accent-purple)); border-radius: 2px 2px 0 0; }
        .nav-right { display: flex; align-items: center; gap: 24px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); display: flex; align-items: center; justify-content: center; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 15px; }
        .user-avatar:hover { transform: scale(1.1); box-shadow: 0 4px 16px rgba(157,78,221,0.4); }
        .page-content { padding: 48px 80px 80px; }
        .page-header { margin-bottom: 32px; animation: fadeInUp 0.5s ease; }
        .page-header h1 { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-bottom: 8px; }
        .page-header p { color: var(--text-secondary); font-size: 16px; font-weight: 300; }
        .highlight { color: var(--primary); }
        .taste-banner { background: var(--bg-card); border: 1px solid rgba(255,51,102,0.2); border-radius: 16px; padding: 24px 28px; margin-bottom: 40px; display: flex; align-items: center; gap: 20px; animation: fadeInUp 0.5s ease 0.05s backwards; }
        .taste-icon { font-size: 32px; }
        .taste-text h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .taste-text p { color: var(--text-secondary); font-size: 14px; }
        .taste-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
        .taste-tag { padding: 6px 14px; border-radius: 24px; font-size: 13px; font-weight: 600; border: 1px solid; }
        .tt-red    { background: rgba(255,51,102,0.1); border-color: rgba(255,51,102,0.3);  color: var(--primary); }
        .tt-purple { background: rgba(157,78,221,0.1); border-color: rgba(157,78,221,0.3);  color: var(--accent-purple); }
        .tt-blue   { background: rgba(0,217,255,0.1);  border-color: rgba(0,217,255,0.3);   color: var(--accent-blue); }
        .tt-green  { background: rgba(6,255,165,0.1);  border-color: rgba(6,255,165,0.3);   color: var(--accent-green); }
        .fallback-notice { background: rgba(255,214,10,0.08); border: 1px solid rgba(255,214,10,0.2); border-radius: 12px; padding: 14px 20px; margin-bottom: 28px; color: var(--accent-yellow); font-size: 14px; display: none; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .section-title { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; margin-bottom: 48px; }
        .movie-card { background: var(--bg-card); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .movie-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,51,102,0.1), rgba(157,78,221,0.1)); opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
        .movie-card:hover::before { opacity: 1; }
        .movie-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 16px 48px rgba(0,0,0,0.6); border-color: rgba(255,51,102,0.3); }
        .movie-poster { width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, var(--bg-elevated), var(--bg-card)); display: flex; align-items: center; justify-content: center; font-size: 64px; position: relative; overflow: hidden; }
        .movie-poster img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .movie-poster::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-card), transparent); pointer-events: none; }
        .why-badge { position: absolute; bottom: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.85); border-radius: 8px; padding: 6px 10px; font-size: 11px; color: var(--accent-purple); font-weight: 600; border: 1px solid rgba(157,78,221,0.3); z-index: 2; }
        .rating-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); border-radius: 8px; padding: 4px 10px; font-size: 13px; font-weight: 700; color: var(--accent-yellow); font-family: 'JetBrains Mono', monospace; z-index: 2; }
        .movie-info { padding: 16px; }
        .movie-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .movie-genres { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
        .genre-tag { padding: 4px 10px; background: rgba(255,255,255,0.05); border-radius: 12px; font-size: 11px; font-weight: 500; color: var(--text-secondary); }
        .movie-meta { color: var(--text-tertiary); font-size: 13px; margin-bottom: 12px; }
        .movie-actions { display: flex; gap: 8px; }
        .icon-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; font-size: 18px; }
        .icon-btn:hover { background: var(--primary); border-color: var(--primary); }
        .rate-btn { flex: 1; padding: 9px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 8px; color: white; font-size: 13px; font-weight: 600; font-family: 'Outfit', sans-serif; cursor: pointer; transition: all 0.3s ease; }
        .rate-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,51,102,0.4); }
        .loading-state { text-align: center; padding: 80px; color: var(--text-secondary); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,51,102,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        .empty-state { text-align: center; padding: 80px 24px; }
        .empty-state .ei { font-size: 56px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .empty-state p { color: var(--text-secondary); font-size: 15px; max-width: 380px; margin: 0 auto 24px; }
        .btn-browse { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; color: white; text-decoration: none; font-weight: 700; }
        @keyframes fadeInUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 1024px) { .page-content { padding: 40px; } .nav-links { display: none; } .taste-banner { flex-direction: column; align-items: flex-start; } .taste-tags { margin-left: 0; } }
    </style>
</head>
<body>
<div class="main-container">
    <nav class="nav">
        <div class="nav-left">
            <a href="/browse" class="logo">CineMatch</a>
            <ul class="nav-links">
                <li><a href="/browse" class="nav-link">Browse</a></li>
                <li><a href="/recommendations" class="nav-link active">For You</a></li>
                <li><a href="/awards" class="nav-link">Awards</a></li>
                <li><a href="/cineblend" class="nav-link">CineBlend</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="user-avatar" id="avatarBtn"></div>
        </div>
    </nav>

    <div class="page-content">
        <div class="page-header">
            <h1>For <span class="highlight">You</span></h1>
            <p>Personalized picks based on your highest-rated genres</p>
        </div>

        <div class="taste-banner" id="tasteBanner" style="display:none">
            <div class="taste-icon">🎯</div>
            <div class="taste-text">
                <h3>Based on your top genres</h3>
                <p id="tasteDesc"></p>
            </div>
            <div class="taste-tags" id="tasteTags"></div>
        </div>

        <div class="fallback-notice" id="fallbackNotice">
            🍿 Rate some movies to get personalised recommendations! Showing top-rated movies for now.
        </div>

        <div id="recContent">
            <div class="loading-state"><div class="loading-spinner"></div><p>Finding movies you'll love…</p></div>
        </div>
    </div>
</div>

<script>
const API = 'http://localhost:5000/api';
const TAG_CLASSES = ['tt-red','tt-purple','tt-blue','tt-green'];

(async function init() {
    const me = await fetch(`${API}/me`, {credentials:'include'}).then(r=>r.json());
    if (!me.logged_in) { window.location.href = '/login'; return; }
    document.getElementById('avatarBtn').textContent = me.username.slice(0,2).toUpperCase();
    setupAvatar(me.username);
    loadRecommendations();
})();

async function loadRecommendations() {
    try {
        const r = await fetch(`${API}/recommendations?top=24`, {credentials:'include'});
        const d = await r.json();
        if (!d.success) { showEmpty('Something went wrong', d.message); return; }

        if (d.personalised && d.top_genres && d.top_genres.length) {
            document.getElementById('tasteBanner').style.display = 'flex';
            document.getElementById('tasteDesc').textContent =
                `You've rated ${d.top_genres.join(', ')} the highest — here's what you'll love next`;
            document.getElementById('tasteTags').innerHTML = d.top_genres
                .map((g,i) => `<span class="taste-tag ${TAG_CLASSES[i%4]}">${esc(g)}</span>`).join('');
        } else {
            document.getElementById('fallbackNotice').style.display = 'block';
        }

        if (!d.data || !d.data.length) { showEmpty('No recommendations yet', "Rate some movies and we'll find ones you'll love."); return; }

        renderSections(d.data, d.personalised, d.top_genres || []);
    } catch(e) {
        showEmpty('Connection error', 'Make sure Flask is running on localhost:5000.');
    }
}

function renderSections(movies, personalised, topGenres) {
    let html = '';
    if (!personalised || !topGenres.length) {
        html = `<div class="section-header"><h2 class="section-title">🌟 Top Rated Movies</h2></div>
                <div class="movie-grid">${movies.map(m => movieCard(m, false)).join('')}</div>`;
    } else {
        const used = new Set();
        topGenres.forEach(genre => {
            const matching = movies.filter(m =>
                !used.has(m.movie_id) &&
                (m.genres||'').toLowerCase().includes(genre.toLowerCase())
            ).slice(0,4);
            if (!matching.length) return;
            matching.forEach(m => used.add(m.movie_id));
            html += `<div class="section-header"><h2 class="section-title">Top ${esc(genre)} Picks</h2></div>
                     <div class="movie-grid">${matching.map(m => movieCard(m, true, genre)).join('')}</div>`;
        });
        const remaining = movies.filter(m => !used.has(m.movie_id));
        if (remaining.length) {
            html += `<div class="section-header"><h2 class="section-title">More For You</h2></div>
                     <div class="movie-grid">${remaining.map(m => movieCard(m, true)).join('')}</div>`;
        }
    }
    document.getElementById('recContent').innerHTML = html;
}

function movieCard(m, personalised, matchedGenre) {
    const posterInner = m.poster_url
        ? `<img src="${esc(m.poster_url)}" alt="${esc(m.title)}" onerror="this.style.display='none'">`
        : '🎬';
    const genres = (m.genres||'').split(',').slice(0,2).map(g=>`<span class="genre-tag">${esc(g.trim())}</span>`).join('');
    const runtime = m.runtime ? `${Math.floor(m.runtime/60)}h ${m.runtime%60}m` : '—';
    const why = personalised && matchedGenre
        ? `<div class="why-badge">💡 Matches your ${esc(matchedGenre)} taste</div>` : '';
    return `
        <div class="movie-card" onclick="goToMovie(${m.movie_id})">
            <div class="movie-poster">
                ${posterInner}
                <div class="rating-badge">${m.average_rating ? m.average_rating.toFixed(1)+'★' : '—'}</div>
                ${why}
            </div>
            <div class="movie-info">
                <h3 class="movie-title">${esc(m.title)}</h3>
                <div class="movie-genres">${genres}</div>
                <div class="movie-meta">${m.release_year||'—'} · ${runtime}</div>
                <div class="movie-actions">
                    <button class="rate-btn" onclick="event.stopPropagation();goToMovie(${m.movie_id})">⭐ Rate</button>
                    <button class="icon-btn" id="wl-${m.movie_id}" onclick="event.stopPropagation();addWatchlist(${m.movie_id})" title="Watchlist">♡</button>
                </div>
            </div>
        </div>`;
}

function goToMovie(id) { sessionStorage.setItem('openMovieId', id); window.location.href = '/browse'; }

async function addWatchlist(id) {
    const r = await fetch(`${API}/watchlist`, {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({movie_id: id})
    }).then(r=>r.json());
    const btn = document.getElementById(`wl-${id}`);
    if (btn && (r.success || r.in_watchlist)) { btn.textContent='♥'; btn.style.color='var(--primary)'; }
}

function showEmpty(title, msg) {
    document.getElementById('recContent').innerHTML = `
        <div class="empty-state">
            <div class="ei">🎬</div><h3>${esc(title)}</h3>
            <p>${esc(msg)}</p>
            <a href="/browse" class="btn-browse">Browse Movies →</a>
        </div>`;
}

function setupAvatar(username) {
    document.getElementById('avatarBtn').onclick = () => {
        const ex = document.getElementById('avatarMenu');
        if (ex) { ex.remove(); return; }
        const btn = document.getElementById('avatarBtn');
        const rect = btn.getBoundingClientRect();
        const menu = document.createElement('div');
        menu.id = 'avatarMenu';
        menu.style.cssText = `position:fixed;top:${rect.bottom+8}px;right:${window.innerWidth-rect.right}px;background:var(--bg-card);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:8px;z-index:9999;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,0.5);`;
        menu.innerHTML = `
            <button onclick="window.location.href='/profile'" style="width:100%;padding:10px 16px;background:transparent;border:none;color:white;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;border-radius:8px;text-align:left;">👤 My Profile</button>
            <button onclick="window.location.href='/dashboard'" style="width:100%;padding:10px 16px;background:transparent;border:none;color:white;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;border-radius:8px;text-align:left;">📊 Dashboard</button>
            <button onclick="logout()" style="width:100%;padding:10px 16px;background:transparent;border:none;color:#FF3366;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;border-radius:8px;text-align:left;">🚪 Log Out</button>`;
        document.body.appendChild(menu);
        setTimeout(() => document.addEventListener('click', function h(e) { if (!menu.contains(e.target)&&e.target!==btn){menu.remove();document.removeEventListener('click',h);} }), 0);
    };
}

async function logout() { await fetch(`${API}/logout`,{method:'POST',credentials:'include'}); window.location.href='/login'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
