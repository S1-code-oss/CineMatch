<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch - My Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF3366; --primary-dark: #CC0033;
            --bg-dark: #0A0A0A; --bg-card: #151515; --bg-elevated: #1F1F1F;
            --text-primary: #FFFFFF; --text-secondary: #A0A0A0; --text-tertiary: #666666;
            --accent-blue: #00D9FF; --accent-purple: #9D4EDD; --accent-yellow: #FFD60A; --accent-green: #06FFA5;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow-x: hidden; }
        body::before { content: ''; position: fixed; top:0;left:0;right:0;bottom:0; background: radial-gradient(circle at 10% 20%, rgba(255,51,102,0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(157,78,221,0.08) 0%, transparent 40%); pointer-events: none; z-index: 0; }
        .main-container { position: relative; z-index: 1; min-height: 100vh; }
        .nav { position: sticky; top: 0; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 0 40px; z-index: 100; height: 80px; display: flex; align-items: center; justify-content: space-between; }
        .nav-left { display: flex; align-items: center; gap: 48px; }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, var(--primary), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-btn { padding: 8px 16px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.2s; font-family: 'Outfit', sans-serif; cursor: pointer; }
        .nav-btn:hover { color: white; border-color: rgba(255,255,255,0.25); }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); display: flex; align-items: center; justify-content: center; font-weight: 600; cursor: pointer; font-size: 15px; }
        .page-content { padding: 48px 80px 80px; }
        .page-header { margin-bottom: 40px; animation: fadeInUp 0.5s ease; }
        .page-header h1 { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-bottom: 8px; }
        .page-header p { color: var(--text-secondary); font-size: 16px; font-weight: 300; }
        .highlight { color: var(--primary); }
        .private-notice { background: rgba(157,78,221,0.08); border: 1px solid rgba(157,78,221,0.2); border-radius: 12px; padding: 12px 20px; margin-bottom: 32px; color: var(--accent-purple); font-size: 13px; animation: fadeInUp 0.5s ease 0.02s backwards; }
        .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 40px; animation: fadeInUp 0.5s ease 0.05s backwards; }
        .stat-card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 28px 24px; transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-4px); border-color: rgba(255,51,102,0.2); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .stat-icon { font-size: 28px; margin-bottom: 16px; }
        .stat-value { font-size: 40px; font-weight: 900; letter-spacing: -2px; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
        .stat-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .s1 .stat-value { color: var(--primary); } .s2 .stat-value { color: var(--accent-yellow); } .s3 .stat-value { color: var(--accent-purple); } .s4 .stat-value { color: var(--accent-blue); }
        .two-col   { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .three-col { display: grid; grid-template-columns: 3fr 2fr; gap: 24px; margin-bottom: 24px; }
        .card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 28px; animation: fadeInUp 0.5s ease backwards; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; letter-spacing: -0.5px; }
        .card-title span { color: var(--text-tertiary); font-size: 13px; font-weight: 400; }
        .genre-list { display: flex; flex-direction: column; gap: 18px; }
        .genre-row { display: flex; flex-direction: column; gap: 8px; }
        .genre-meta { display: flex; justify-content: space-between; font-size: 14px; }
        .genre-name { font-weight: 600; }
        .genre-count { color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .genre-bar-bg { height: 6px; background: var(--bg-elevated); border-radius: 3px; overflow: hidden; }
        .genre-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
        .rating-dist { display: flex; align-items: flex-end; gap: 16px; height: 130px; }
        .rating-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100%; justify-content: flex-end; }
        .rating-bar-wrap { width: 100%; flex: 1; display: flex; align-items: flex-end; }
        .rating-bar { width: 100%; border-radius: 6px 6px 0 0; background: linear-gradient(180deg, var(--primary), var(--primary-dark)); min-height: 4px; transition: height 0.8s ease; }
        .rating-label { font-size: 12px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
        .rating-count { font-size: 11px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }
        .decade-grid { display: flex; flex-direction: column; gap: 14px; }
        .decade-row { display: flex; align-items: center; gap: 14px; }
        .decade-label { width: 48px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
        .decade-bar-bg { flex: 1; height: 8px; background: var(--bg-elevated); border-radius: 4px; overflow: hidden; }
        .decade-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); transition: width 0.8s ease; }
        .decade-count { width: 28px; text-align: right; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
        .avg-display { text-align: center; padding: 16px 0 8px; }
        .avg-number { font-size: 80px; font-weight: 900; font-family: 'JetBrains Mono', monospace; color: var(--accent-yellow); letter-spacing: -4px; line-height: 1; margin-bottom: 10px; }
        .avg-stars { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; font-size: 22px; }
        .avg-sub { color: var(--text-secondary); font-size: 13px; }
        .sf { color: var(--accent-yellow); } .se { color: var(--text-tertiary); }
        .loading-state { text-align: center; padding: 80px; color: var(--text-secondary); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,51,102,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes fadeInUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 1024px) { .page-content { padding: 40px; } .stats-grid { grid-template-columns: repeat(2,1fr); } .two-col,.three-col { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="main-container">
    <nav class="nav">
        <div class="nav-left">
            <a href="/browse" class="logo">CineMatch</a>
        </div>
        <div class="nav-right">
            <a href="/browse" class="nav-btn">← Back to Browse</a>
            <div class="user-avatar" id="avatarBtn"></div>
        </div>
    </nav>
    <div class="page-content" id="mainContent">
        <div class="loading-state"><div class="loading-spinner"></div><p>Loading your stats…</p></div>
    </div>
</div>

<script>
const API = 'http://localhost:5000/api';
const GENRE_COLORS = ['linear-gradient(90deg,#FF3366,#CC0033)','linear-gradient(90deg,#9D4EDD,#7B2FBE)','linear-gradient(90deg,#00D9FF,#0099CC)','linear-gradient(90deg,#FFD60A,#CC9900)','linear-gradient(90deg,#06FFA5,#00CC7A)'];

(async function init() {
    const me = await fetch(`${API}/me`,{credentials:'include'}).then(r=>r.json());
    if (!me.logged_in) { window.location.href='/login'; return; }
    document.getElementById('avatarBtn').textContent = me.username.slice(0,2).toUpperCase();
    setupAvatar(me.username);
    loadDashboard(me.username);
})();

async function loadDashboard(username) {
    try {
        const r = await fetch(`${API}/profile/${username}`,{credentials:'include'});
        const d = await r.json();
        if (!d.success) { showError(d.message); return; }
        renderDashboard(d.data);
    } catch(e) { showError('Connection error. Make sure Flask is running.'); }
}

function renderDashboard(data) {
    const s       = data.stats;
    const dist    = data.rating_distribution || {};
    const genres  = data.genre_breakdown     || [];
    const decades = data.decade_breakdown    || [];

    const statsHTML = `
        <div class="stats-grid">
            <div class="stat-card s1"><div class="stat-icon">🎬</div><div class="stat-value">${s.total_rated}</div><div class="stat-label">Movies Rated</div></div>
            <div class="stat-card s2"><div class="stat-icon">⭐</div><div class="stat-value">${Number(s.avg_rating).toFixed(1)}</div><div class="stat-label">Avg Rating</div></div>
            <div class="stat-card s3"><div class="stat-icon">✍️</div><div class="stat-value">${s.total_reviews}</div><div class="stat-label">Reviews Written</div></div>
            <div class="stat-card s4"><div class="stat-icon">🔖</div><div class="stat-value">${s.watchlist_count}</div><div class="stat-label">In Watchlist</div></div>
        </div>`;

    const maxG = genres.length ? Math.max(...genres.map(g=>g.count)) : 1;
    const genreHTML = genres.length
        ? genres.map((g,i)=>`
            <div class="genre-row">
                <div class="genre-meta"><span class="genre-name">${esc(g.genre)}</span><span class="genre-count">${g.count} film${g.count!==1?'s':''}</span></div>
                <div class="genre-bar-bg"><div class="genre-bar-fill" style="width:${Math.round(g.count/maxG*100)}%;background:${GENRE_COLORS[i%5]}"></div></div>
            </div>`).join('')
        : '<p style="color:var(--text-tertiary);font-size:14px;">Rate more movies to see your genre breakdown.</p>';

    const maxD = Math.max(...[1,2,3,4,5].map(s=>dist[String(s)]||0), 1);
    const distHTML = [1,2,3,4,5].map(star=>{
        const cnt = dist[String(star)]||0;
        return `<div class="rating-col">
            <div class="rating-bar-wrap"><div class="rating-bar" style="height:${Math.max(Math.round(cnt/maxD*100),3)}%"></div></div>
            <div class="rating-label">★${star}</div><div class="rating-count">${cnt}</div>
        </div>`;
    }).join('');

    const maxDec = decades.length ? Math.max(...decades.map(d=>d.count)) : 1;
    const decadeHTML = decades.length
        ? decades.map(d=>`
            <div class="decade-row">
                <div class="decade-label">${esc(d.decade)}</div>
                <div class="decade-bar-bg"><div class="decade-bar-fill" style="width:${Math.round(d.count/maxDec*100)}%"></div></div>
                <div class="decade-count">${d.count}</div>
            </div>`).join('')
        : '<p style="color:var(--text-tertiary);font-size:13px;">No decade data yet.</p>';

    const avg = Number(s.avg_rating);
    const starsHTML = [1,2,3,4,5].map(i=>`<span class="${i<=Math.round(avg)?'sf':'se'}">★</span>`).join('');

    document.getElementById('mainContent').innerHTML = `
        <div class="page-header">
            <h1>My <span class="highlight">Dashboard</span></h1>
            <p>Your personal CineMatch stats — only visible to you</p>
        </div>
        <div class="private-notice">🔒 This dashboard is private and only visible to you.</div>
        ${statsHTML}
        <div class="two-col">
            <div class="card" style="animation-delay:0.1s">
                <div class="card-title">Top Genres <span>by films rated</span></div>
                <div class="genre-list">${genreHTML}</div>
            </div>
            <div class="card" style="animation-delay:0.15s">
                <div class="card-title">Rating Distribution <span>how you score films</span></div>
                <div class="rating-dist">${distHTML}</div>
            </div>
        </div>
        <div class="three-col">
            <div class="card" style="animation-delay:0.2s">
                <div class="card-title">Favourite Decade <span>where your taste lives</span></div>
                <div class="decade-grid">${decadeHTML}</div>
            </div>
            <div class="card" style="animation-delay:0.25s">
                <div class="card-title">Avg Rating</div>
                <div class="avg-display">
                    <div class="avg-number">${avg.toFixed(1)}</div>
                    <div class="avg-stars">${starsHTML}</div>
                    <div class="avg-sub">across ${s.total_rated} rated movie${s.total_rated!==1?'s':''}</div>
                </div>
            </div>
        </div>`;
}

function showError(msg) {
    document.getElementById('mainContent').innerHTML = `<div style="text-align:center;padding:80px;color:var(--text-secondary);"><div style="font-size:48px;margin-bottom:16px;">⚠️</div><p>${esc(msg)}</p><a href="/browse" style="display:inline-block;margin-top:20px;padding:12px 28px;background:var(--primary);border-radius:10px;color:white;text-decoration:none;font-weight:600;">Go to Browse</a></div>`;
}

function setupAvatar(username) {
    document.getElementById('avatarBtn').onclick = () => {
        const ex = document.getElementById('avatarMenu'); if(ex){ex.remove();return;}
        const btn=document.getElementById('avatarBtn'); const rect=btn.getBoundingClientRect();
        const menu=document.createElement('div'); menu.id='avatarMenu';
        menu.style.cssText=`position:fixed;top:${rect.bottom+8}px;right:${window.innerWidth-rect.right}px;background:var(--bg-card);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:8px;z-index:9999;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,0.5);`;
        menu.innerHTML=`
            <button onclick="window.location.href='/profile'" style="width:100%;padding:10px 16px;background:transparent;border:none;color:white;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;border-radius:8px;text-align:left;">👤 My Profile</button>
            <button onclick="logout()" style="width:100%;padding:10px 16px;background:transparent;border:none;color:#FF3366;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;border-radius:8px;text-align:left;">🚪 Log Out</button>`;
        document.body.appendChild(menu);
        setTimeout(()=>document.addEventListener('click',function h(e){if(!menu.contains(e.target)&&e.target!==btn){menu.remove();document.removeEventListener('click',h);}}),0);
    };
}

async function logout(){await fetch(`${API}/logout`,{method:'POST',credentials:'include'});window.location.href='/login';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
